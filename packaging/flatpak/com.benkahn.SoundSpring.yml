app-id: com.benkahn.SoundSpring
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: sound-spring

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.GlobalShortcuts
  - --device=dri

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    QMAKE: /usr/bin/qmake

modules:
  - name: sound-spring
    buildsystem: simple
    build-commands:
      - make build QMAKE=/usr/bin/qmake
      - make install PREFIX=/app
    sources:
      - type: dir
        path: ../..
